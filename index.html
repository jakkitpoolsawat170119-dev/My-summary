<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Open Graph Tags สำหรับการแชร์ลง Line -->
    <meta property="og:title" content="สรุปหนังสือ: ชีวิตไม่ไร้ความหมาย | JakkitBlog">
    <meta property="og:description" content="ค้นหาความหมายของชีวิตในสภาวะที่สิ้นหวังที่สุดกับ วิกเตอร์ ฟรังเคิล และระบบ AI ปรึกษาปัญหาชีวิต">
    <meta property="og:image" content="https://images.unsplash.com/photo-1541849546-216549ae216d?auto=format&fit=crop&q=80&w=1200">
    <meta property="og:url" content="https://myjakkit.com">
    <meta property="og:type" content="website">

    <title>สรุปหนังสือ: ชีวิตไม่ไร้ความหมาย | JakkitBlog AI</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,800;1,400&display=swap');
        
        :root {
            --vintage-paper: #d4c5b0;
            --dark-bg: #121212;
            --accent-red: #991b1b;
        }

        body { 
            font-family: 'JetBrains Mono', monospace; 
            background-color: var(--dark-bg); 
            color: var(--vintage-paper);
            margin: 0;
            overflow-x: hidden;
        }

        /* Scanline effect - Set pointer-events to none so it doesn't block clicks */
        .scanline-effect { 
            position: fixed; 
            inset: 0;
            height: 100px; 
            background: linear-gradient(to bottom, transparent, rgba(153, 27, 27, 0.03), transparent); 
            z-index: 50; 
            pointer-events: none; 
            animation: scanline 8s linear infinite; 
        }

        @keyframes scanline { 0% { top: -100px; } 100% { top: 100%; } }

        .image-container { 
            position: relative; 
            overflow: hidden; 
            background: #000; 
            border: 1px solid #3d3d3d; 
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container img { 
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease; 
        }

        .image-container:hover img { transform: scale(1.05); }

        .btn-link {
            position: relative;
            z-index: 100;
            cursor: pointer;
            pointer-events: auto !important;
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .share-bubble {
            background: #06c755;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Custom SVG Icons for Stability ---
        const IconExternalLink = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 22 3 22 10"></polyline><line x1="10" y1="14" x2="22" y2="2"></line></svg>
        );
        const IconCheckCircle = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        );
        const IconChevronRight = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        );
        const IconChevronLeft = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        );
        const IconSend = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        );
        const IconLoader = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin"><path d="M21 12a9 9 0 1 1-6.21-8.58"></path></svg>
        );
        const IconQuote = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 21c3 0 7-1 7-8V5H3v16zm11 0c3 0 7-1 7-8V5h-7v16z"></path></svg>
        );
        const IconShare = ({ size = 16 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
        );

        const App = () => {
            const [activeSection, setActiveSection] = useState('intro');
            const [userInput, setUserInput] = useState("");
            const [aiResponse, setAiResponse] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState("");
            const [imgHasError, setImgHasError] = useState(false);

            // API Key will be provided by the environment
            const apiKey = "";

            const sections = {
                intro: {
                    title: "สรุปหนังสือ: ชีวิตไม่ไร้ความหมาย",
                    subtitle: "Review by JakkitBlog | Man’s Search for Meaning",
                    content: [
                        "นี่ไม่ใช่แค่หนังสือประวัติศาสตร์ แต่เป็น 'คัมภีร์การอยู่รอด' ของมนุษย์ในสภาวะที่สิ้นหวังที่สุด วิกเตอร์ ฟรังเคิล พาเราไปสำรวจส่วนที่ลึกที่สุดของจิตใจผ่านประสบการณ์ในค่ายกักกันเอาชวิทซ์",
                        "หัวใจหลักที่ JakkitBlog อยากนำเสนอคือ: มนุษย์เราไม่ได้ถูกขับเคลื่อนด้วยความสุข แต่เราถูกขับเคลื่อนด้วย 'ความหมาย' (Meaning)",
                        "หนังสือเล่มนี้มียอดขายกว่า 16 ล้านเล่มทั่วโลก และได้รับการยกย่องว่าเป็น 1 ใน 10 หนังสือที่เปลี่ยนชีวิตคนอเมริกันมากที่สุด"
                    ],
                    image: "https://images.unsplash.com/photo-1541849546-216549ae216d?auto=format&fit=crop&q=80&w=1200",
                    accent: "border-red-900"
                },
                part1: {
                    title: "บทที่ 1: ประสบการณ์ในค่ายมรณะ",
                    subtitle: "เมื่อตัวตนถูกลบจนเหลือเพียงร่าง",
                    content: [
                        "ฟรังเคิลวิเคราะห์จิตวิทยาของนักโทษใน 3 ระยะ: การช็อก (Shock), การไร้ความรู้สึก (Apathy), และการฟื้นฟูสภาพหลังได้รับอิสรภาพ",
                        "ในค่ายกักกัน คนที่รอดชีวิตมักไม่ใช่คนที่แข็งแรงที่สุด แต่เป็นคนที่มี 'ความหวัง' หรือมี 'ภารกิจ' บางอย่างที่ยังทำไม่สำเร็จรออยู่ที่โลกภายนอก",
                        "เขาพบว่าแม้ในสภาพที่เลวร้ายที่สุด มนุษย์ยังเหลืออิสรภาพสุดท้าย คือ 'อิสรภาพในการเลือกทัศนคติต่อสิ่งที่เกิดขึ้น'"
                    ],
                    image: "https://images.unsplash.com/photo-1510133769068-6003206c9b4d?auto=format&fit=crop&q=80&w=1200",
                    accent: "border-slate-800"
                },
                logotherapy: {
                    title: "บทที่ 2: โลโกเทอราปี (Logotherapy)",
                    subtitle: "การบำบัดด้วยการค้นหาความหมาย",
                    content: [
                        "Logos ในภาษากรีกหมายถึง 'ความหมาย' ทฤษฎีนี้เชื่อว่าความล้มเหลวในการหาความหมายนำไปสู่ 'ความว่างเปล่าเชิงอัตถิภาวะ' (Existential Vacuum)",
                        "หน้าที่ของนักบำบัดไม่ใช่การบอกว่าความหมายคืออะไร แต่คือการช่วยให้คนไข้ค้นพบความหมายที่ 'รอ' เขาอยู่",
                        "ความหมายของชีวิตไม่ได้เป็นสากล แต่มันเปลี่ยนไปตามสถานการณ์และเวลาของแต่ละบุคคล"
                    ],
                    image: "https://images.unsplash.com/photo-1481627834876-b7833e8f5570?auto=format&fit=crop&q=80&w=1200",
                    accent: "border-blue-900"
                },
                threePaths: {
                    title: "3 หนทางสู่การค้นพบความหมาย",
                    subtitle: "Key Takeaways จาก JakkitBlog",
                    content: [
                        "1. ผ่านการสร้างสรรค์ (Creative Work): การทำงานหรือการทำภารกิจบางอย่างให้สำเร็จ",
                        "2. ผ่านประสบการณ์ (Experience): การได้สัมผัสความงาม ธรรมชาติ ศิลปะ หรือ 'ความรัก' ต่อใครบางคน",
                        "3. ผ่านทัศนคติต่อความทุกข์ (Attitude toward Suffering): เมื่อเราไม่สามารถเปลี่ยนสถานการณ์ได้ เราถูกท้าทายให้ 'เปลี่ยนตัวเอง'"
                    ],
                    image: "https://img2.pic.in.th/istockphoto-1772993493-1024x1024.jpg",
                    accent: "border-green-900"
                },
                gemini_tool: {
                    title: "ค้นหาความหมายกับวิกเตอร์ ✨",
                    subtitle: "AI Assistant Powered by Gemini API",
                    content: [
                        "ลองพิมพ์เล่าปัญหาหรือความกังวลของคุณ แล้ว AI จะลองวิเคราะห์ผ่านมุมมองของ ดร.ฟรังเคิล",
                        "โปรดจำไว้ว่า: แม้ในคืนที่มืดมิดที่สุด แสงแห่งความหมายยังคงรอให้เราไปค้นพบเสมอ"
                    ],
                    image: "https://images.unsplash.com/photo-1516110833967-0b5716ca1387?auto=format&fit=crop&q=80&w=1200",
                    accent: "border-amber-500"
                },
                conclusion: {
                    title: "บทสรุปจาก JakkitBlog",
                    subtitle: "ทำไมคุณควรต้องอ่านเล่มนี้?",
                    content: [
                        "คะแนนรีวิว: 10/10 | หนังสือเล่มนี้ไม่ได้สอนให้เราโลกสวย แต่สอนให้เรา 'ยอมรับความจริงอย่างมีความหวัง' (Tragic Optimism)",
                        "มันเป็นกระจกสะท้อนว่า ในวันที่เราบ่นเรื่องงานหนัก หรือชีวิตที่ไม่ได้ดั่งใจ ยังมีคนที่รักษาความเป็นมนุษย์ไว้ได้แม้ในนรกบนดิน"
                    ],
                    image: "https://images.unsplash.com/photo-1455390582262-044cdead277a?auto=format&fit=crop&q=80&w=1200",
                    accent: "border-amber-700"
                }
            };

            const sectionKeys = Object.keys(sections);
            const currentIndex = sectionKeys.indexOf(activeSection);

            useEffect(() => {
                setImgHasError(false);
            }, [activeSection]);

            const callGemini = async (prompt) => {
                const systemMsg = `คุณคือผู้เชี่ยวชาญด้านหนังสือ "Man's Search for Meaning" และหลักการ "Logotherapy" ของ Viktor Frankl จงตอบคำถามของผู้ใช้ในฐานะที่ปรึกษาทางจิตวิทยาที่มีความเห็นอกเห็นใจ (Empathy) ให้คำแนะนำตามหลักการค้นหาความหมายในความทุกข์ (Meaning in suffering) โดยใช้ภาษาไทยที่นุ่มนวลและให้กำลังใจ ตอบแบบสั้นๆ ทรงพลัง`;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemMsg }] }
                        })
                    });
                    if (!response.ok) throw new Error("API Connection Failed");
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "ขออภัย วิกเตอร์ไม่สามารถตอบได้ในขณะนี้";
                } catch (err) {
                    throw err;
                }
            };

            const handleAIRequest = async () => {
                if (!userInput.trim()) return;
                setIsLoading(true);
                setError("");
                setAiResponse("");
                try {
                    const res = await callGemini(userInput);
                    setAiResponse(res);
                } catch (err) {
                    setError("เกิดข้อผิดพลาดในการเชื่อมต่อกับ AI โปรดลองใหม่อีกครั้ง");
                } finally {
                    setIsLoading(false);
                }
            };

            const handleShare = () => {
                if (navigator.share) {
                    navigator.share({
                        title: 'สรุปหนังสือ: ชีวิตไม่ไร้ความหมาย',
                        text: 'ค้นหาความหมายของชีวิตกับ วิกเตอร์ ฟรังเคิล โดย JakkitBlog',
                        url: window.location.href,
                    }).catch(() => {});
                } else {
                    const dummy = document.createElement('input');
                    document.body.appendChild(dummy);
                    dummy.value = window.location.href;
                    dummy.select();
                    document.execCommand('copy');
                    document.body.removeChild(dummy);
                    alert("คัดลอกลิงก์เรียบร้อยแล้ว แปะใน Line ได้เลย!");
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8 relative">
                    <div className="scanline-effect"></div>
                    
                    <header className="max-w-6xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-center border-b-2 border-[#3d3d3d] pb-6 relative z-[60]">
                        <div className="flex items-center gap-5">
                            <a href="https://myjakkit.com" target="_blank" rel="noopener noreferrer" className="btn-link transition-transform hover:scale-110 block">
                                <div className="w-16 h-16 border-2 border-red-900 bg-black rotate-3 flex items-center justify-center font-bold text-red-900 text-2xl shadow-[0_0_15px_rgba(153,27,27,0.4)]">JB</div>
                            </a>
                            <div className="flex flex-col">
                                <a href="https://myjakkit.com" target="_blank" rel="noopener noreferrer" className="btn-link group flex items-center gap-2">
                                    <h1 className="text-3xl font-black text-white group-hover:text-red-700 transition-colors">JAKKITBLOG</h1>
                                    <span className="text-red-700 opacity-50"><IconExternalLink size={18} /></span>
                                </a>
                                <p className="text-[10px] text-red-700 font-bold tracking-widest uppercase italic">The Search for Meaning // AI Edition</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                             <button onClick={handleShare} className="share-bubble btn-link">
                                <IconShare /> แชร์ไปที่ Line
                             </button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 relative z-10">
                        <nav className="lg:col-span-3 space-y-2">
                            {sectionKeys.map((key, i) => (
                                <button key={key} onClick={() => { setActiveSection(key); setAiResponse(""); setUserInput(""); }}
                                    className={`w-full text-left p-3 text-xs uppercase font-bold border transition-all ${activeSection === key ? 'bg-[#d4c5b0] text-black shadow-lg translate-x-2' : 'border-[#3d3d3d] text-[#8c7f6d] hover:border-[#d4c5b0]/50'}`}
                                >
                                    {key === 'gemini_tool' ? '✨ ' : `${i + 1}. `}{sections[key].title}
                                </button>
                            ))}
                        </nav>
                        
                        <div className="lg:col-span-9">
                            <div className={`bg-[#1e1e1e] border-t-8 ${sections[activeSection].accent} p-6 md:p-12 shadow-2xl relative min-h-[600px] flex flex-col`}>
                                <div className="mb-8">
                                    <h2 className="text-3xl md:text-5xl font-black text-white mb-4 leading-none">{sections[activeSection].title}</h2>
                                    <p className="text-red-700 font-bold uppercase text-sm tracking-[0.2em]">{sections[activeSection].subtitle}</p>
                                </div>

                                {activeSection !== 'gemini_tool' ? (
                                    <div className="flex-1 flex flex-col md:flex-row gap-10">
                                        <div className="flex-1 space-y-6 text-lg text-[#b5a794] leading-relaxed">
                                            {sections[activeSection].content.map((p, i) => (
                                                <div key={i} className="flex gap-4 group">
                                                    <div className="mt-2 shrink-0"><IconCheckCircle size={18} className="text-red-900" /></div>
                                                    <p>{p}</p>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="md:w-72 shrink-0">
                                            <div className="image-container rotate-1 shadow-2xl bg-[#0a0a0a]">
                                                {imgHasError ? (
                                                    <div className="p-8 text-center text-[10px] opacity-20 uppercase font-bold tracking-widest animate-pulse">
                                                        Image Archive Unavailable
                                                    </div>
                                                ) : (
                                                    <img 
                                                        src={sections[activeSection].image} 
                                                        alt={sections[activeSection].title}
                                                        onLoad={() => setImgHasError(false)}
                                                        onError={() => setImgHasError(true)}
                                                    />
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex-1 space-y-6">
                                        <div className="relative">
                                            <textarea 
                                                className="w-full bg-black/60 border border-[#3d3d3d] p-6 text-[#d4c5b0] focus:border-amber-500 outline-none transition-all resize-none h-40 text-lg"
                                                placeholder="ระบายความในใจ หรือถามเกี่ยวกับความหมายของชีวิต..."
                                                value={userInput}
                                                onChange={(e) => setUserInput(e.target.value)}
                                            />
                                            <button 
                                                onClick={handleAIRequest}
                                                disabled={isLoading || !userInput}
                                                className="absolute bottom-4 right-4 bg-amber-600 hover:bg-amber-500 disabled:bg-gray-700 text-black px-6 py-3 flex items-center gap-3 font-black transition-all shadow-xl active:scale-95"
                                            >
                                                {isLoading ? <IconLoader size={20} /> : <IconSend size={20} />}
                                                ปรึกษาวิกเตอร์ ✨
                                            </button>
                                        </div>

                                        {error && <div className="p-4 border border-red-900 bg-red-900/10 text-red-500 text-sm">{error}</div>}

                                        {aiResponse && (
                                            <div className="mt-8 p-8 bg-[#252525] border-l-4 border-amber-500 shadow-2xl animate-fade-in">
                                                <IconQuote size={32} className="text-amber-500 opacity-20 mb-4" />
                                                <div className="text-xl italic leading-relaxed text-white">
                                                    {aiResponse}
                                                </div>
                                                <div className="mt-6 text-[10px] uppercase tracking-widest text-amber-500/60 font-black flex items-center gap-2">
                                                    <div className="w-8 h-px bg-amber-500/30"></div>
                                                    Viktor Frankl AI Simulation
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                <div className="mt-auto pt-10 flex justify-between items-center opacity-40 text-[10px] font-bold uppercase tracking-widest">
                                    <button 
                                        onClick={() => currentIndex > 0 && setActiveSection(sectionKeys[currentIndex-1])}
                                        className={`hover:text-white transition-colors flex items-center gap-2 ${currentIndex === 0 ? 'invisible' : ''}`}
                                    >
                                        <IconChevronLeft size={14} /> Back
                                    </button>
                                    <div className="hidden sm:block">Archive Record {currentIndex + 1} / {sectionKeys.length}</div>
                                    <button 
                                        onClick={() => currentIndex < sectionKeys.length - 1 && setActiveSection(sectionKeys[currentIndex+1])}
                                        className={`hover:text-white transition-colors flex items-center gap-2 ${currentIndex === sectionKeys.length - 1 ? 'invisible' : ''}`}
                                    >
                                        Next <IconChevronRight size={14} />
                                    </button>
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer className="max-w-6xl mx-auto mt-20 text-[9px] opacity-20 uppercase tracking-[0.3em] flex flex-col items-center gap-6 border-t border-[#3d3d3d] pt-8 pb-12">
                        <div className="flex gap-12">
                            <span>// LOGOTHERAPY FRAMEWORK //</span>
                            <span>// VIENNA ARCHIVE 1946 //</span>
                        </div>
                        <a href="https://myjakkit.com" target="_blank" rel="noopener noreferrer" className="btn-link hover:opacity-100 underline underline-offset-4 font-bold">Visit MYJAKKIT.COM</a>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
